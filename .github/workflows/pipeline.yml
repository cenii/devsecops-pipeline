name: DevSecOps Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Escanear secretos
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unverified,unknown
      - name: Escanear vulnerabilidades de código
        run: |
          pipx install semgrep
          semgrep scan --config "p/default" --error
      - name: Construir la imagen Docker
        run: |
          echo "Construyendo la imagen..."
          cd app
          docker build -t app-demo:${{ github.sha }} .
          echo "¡Imagen construida con éxito!"
           # --- TERCER FILTRO DE SEGURIDAD ---
      - name: Escanear imagen Docker con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app-demo:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'